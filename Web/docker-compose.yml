services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      ECALLISTO_WEB_RUNTIME_DIR: /app/runtime
      ECALLISTO_WEB_FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./runtime:/app/runtime
    command: >
      sh -c "pip install -e . &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      VITE_API_ROOT: /api/v1
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  frontend_node_modules:
